<!DOCTYPE html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>施工事例｜ZEROUM株式会社</title>
<meta name="description" content="ZEROUM（ゼローム）株式会社の施工事例。三郷市を中心にエアコン取付・交換、電気工事などの実績をご紹介します。">
<style>
:root{--green:#2f9e44;--green-d:#1b5e20;--line:#e3e9e3;--col:840px;--hdr:54px}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;background:#e9efe9;font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:var(--green-d)}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:50;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);backdrop-filter:saturate(1.1) blur(4px)}
.hdr-in{max-width:1100px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.brand{font-weight:800;letter-spacing:.14em;color:var(--green-d);font-size:19px;text-decoration:none}
.brand span{color:var(--green)}
.wrap{max-width:var(--col);margin:0 auto;padding-top:var(--hdr);background:#fff;box-shadow:0 0 50px rgba(0,0,0,.07);min-height:100vh}
.sec{position:relative;line-height:0} .sec img{width:100%;display:block}
.sec[id]{scroll-margin-top:calc(var(--hdr) + 4px)}
.cta{position:absolute;display:block;border-radius:40px;outline:0}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--green-d);text-decoration:none;font-size:14px;font-weight:700;padding:8px 16px;border:1.5px solid var(--green);border-radius:22px;transition:.15s}
.back:hover{background:var(--green);color:#fff}
</style></head><body>
<header class="hdr"><div class="hdr-in">
<a href="index.html" class="brand">ZER<span>O</span>UM</a>
<a href="index.html" class="back">← TOPに戻る</a>
</div></header>
<main class="wrap">
<section class="sec"><img src="images/works_page.png" alt="施工事例紹介">
<a class="cta" href="index.html" style="top:91.5%;left:40.3%;width:21.1%;height:2.9%"></a>
</section>
</main></body></html>
